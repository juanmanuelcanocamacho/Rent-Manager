services:

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      target: migrator
    restart: "no"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  cron:
    image: alpine:latest
    restart: always
    environment:
      - WORKER_SECRET=${WORKER_SECRET}
    command: >
      /bin/sh -c "apk add --no-cache curl && echo '5 0 * * * curl -X POST http://app:3000/api/worker/recompute-overdue -H \"x-worker-secret: $$WORKER_SECRET\"' | crontab - && crond -f -d 8"
    depends_on:
      - app

volumes:
  db_data:
